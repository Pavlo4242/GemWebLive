name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Cache Gradle dependencies
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ${{ github.workspace }}/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Cache Android SDK
    - name: Cache Android SDK
      uses: actions/cache@v4
      with:
        path: |
          $ANDROID_HOME
          ~/.android/cache
        key: ${{ runner.os }}-android-sdk-${{ hashFiles('**/build.gradle*', '**/gradle.properties') }}
        restore-keys: |
          ${{ runner.os }}-android-sdk-

    # Setup Gradle with built-in caching
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
        cache-read-only: false

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cache: true 
        cmdline-tools-version: 'latest'
        build-tools-version: '34.0.0'
        platform-version: '34'
        ndk-version: '25.2.9519653'

    - name: Accept Android licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Validate Gradle Wrapper
      run: |
        # Verify wrapper structure
        ls -la gradle/wrapper/
        unzip -p gradle/wrapper/gradle-wrapper.jar org/gradle/wrapper/GradleWrapperMain.class >/dev/null || (echo "❌ Broken wrapper.jar"; exit 1)
        
        # Repair if needed
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ $(stat -c%s "gradle/wrapper/gradle-wrapper.jar") -lt 50000 ]; then
          echo "Downloading fresh wrapper.jar..."
          mkdir -p gradle/wrapper
          wget -O gradle/wrapper/gradle-wrapper.jar \
            https://repo.maven.apache.org/maven2/org/gradle/wrapper/gradle-wrapper/8.7/gradle-wrapper-8.7.jar
        fi

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run tests
      run: ./gradlew test

    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7
